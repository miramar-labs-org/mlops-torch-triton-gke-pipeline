name: ML Train

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Training epochs'
        default: '3'
        required: false
      experiment:
        description: 'MLflow experiment name'
        default: 'text-classifier'
        required: false

permissions:
  contents: read

jobs:
  train:
    runs-on: [self-hosted, dgx]

    steps:
      - uses: actions/checkout@v4

      - name: Build training image
        run: docker build -f ml/Dockerfile.train -t ml-trainer:latest .

      - name: Test
        run: docker run --rm ml-trainer:latest python -m pytest test_train.py -v

      - name: Train model
        run: |
          mkdir -p ml/output
          docker run --rm --gpus all \
            --add-host host.docker.internal:host-gateway \
            -v "$GITHUB_WORKSPACE/ml/output:/output" \
            -e MLFLOW_TRACKING_URI="${{ vars.MLFLOW_TRACKING_URI }}" \
            -e MLFLOW_EXPERIMENT_NAME="${{ github.event.inputs.experiment }}" \
            -e EPOCHS="${{ github.event.inputs.epochs }}" \
            ml-trainer:latest

      - name: Upload ONNX model
        uses: actions/upload-artifact@v4
        with:
          name: onnx-model
          path: ml/output/model.onnx
          retention-days: 30
